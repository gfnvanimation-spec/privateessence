    const playTone = (frequency, duration, type = 'sine', gainVal = 0.3, startTime = 0) => {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, ctx.currentTime + startTime);
        gain.gain.setValueAtTime(gainVal, ctx.currentTime + startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
        osc.start(ctx.currentTime + startTime);
        osc.stop(ctx.currentTime + startTime + duration);
      } catch(e) {}
    };

        // só faz upgrade: done → partial → perfect

      } catch {}
    };

              <audio controls className="w-full max-w-sm rounded-lg shadow-sm outline-none"

              {DIALOGUE.map((line, idx) => {

                let alignment = 'items-start';

                <h3 className="text-base sm:text-lg font-bold text-slate-800 flex items-center gap-2">

                <button onClick={clearProgress} className="text-xs text-slate-400 hover:text-red-400 transition underline underline-offset-2">
                  Resetar
                </button>

              <div className={`h-3 rounded-full transition-all duration-700 ${allPerfect && done === ACTIVITIES.length ? 'bg-green-500' : 'bg-blue-500'}`}

              {ACTIVITIES.map(a => {
                const s = progress[a.key];
                return (
                  <div key={a.key} className="flex items-center gap-3">
                    <span className="text-xs text-slate-500 w-36 shrink-0 truncate">{a.label}</span>
                    <div className="flex-1 bg-slate-100 rounded-full h-4 overflow-hidden">

    // --- 1. VOCAB GAME ---
    function VocabGame({ goBack, studentName, saveProgress }) {
      const [selected, setSelected] = useState(null);
      const [matched, setMatched] = useState({});
      const [wrongPair, setWrongPair] = useState(null);
      const [isCopied, setIsCopied] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const terms = VOCAB_DATA.map(v => ({ id: v.id, content: v.term, type: 'term' }));
      const [defs] = useState(() => {
        const shuffled = VOCAB_DATA.map(v => ({ id: v.id, content: v.def, type: 'def' }));
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      });

      const isComplete = Object.keys(matched).length === VOCAB_DATA.length;

      const generateReport = () => {
        const score = Object.keys(matched).length;
        return `🎓 *Relatório: English Practice*\n👤 *Aluno:* ${studentName}\n📝 *Atividade:* Vocabulary Match\n✅ *Nota:* ${score}/${VOCAB_DATA.length} (${Math.round(score/VOCAB_DATA.length*100)}%)`;
      };

      const handleSelect = (item) => {
        if (matched[item.id]) return;
        if (!selected) { setSelected(item); return; }
        if (selected.type === item.type) { setSelected(item); return; }
        if (selected.id === item.id) {
          const newMatched = { ...matched, [item.id]: true };
          setMatched(newMatched);
          setSelected(null); setWrongPair(null);
          if (Object.keys(newMatched).length === VOCAB_DATA.length) { sfx.complete(); saveProgress('vocab', 'perfect'); }
          else sfx.correct();
        } else {
          sfx.wrong();
          setWrongPair([selected.id, item.id]);
          setTimeout(() => { setWrongPair(null); setSelected(null); }, 800);
        }
      };

      const getStyle = (item) => {
        if (matched[item.id]) return 'bg-green-100 border-green-500 text-green-800 cursor-default opacity-70';
        if (wrongPair && wrongPair.includes(item.id)) return 'bg-red-100 border-red-500 text-red-800 scale-95';
        if (selected && selected.id === item.id && selected.type === item.type) return 'bg-blue-100 border-blue-500 text-blue-800 scale-105 shadow-md';
        return 'bg-white border-slate-200 hover:border-blue-400 hover:shadow-sm active:scale-95 cursor-pointer';
      };

      return (
        <div className="animate-in duration-300">
          <button onClick={goBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 mb-4 sm:mb-6 transition-colors font-medium">
            <ArrowLeft size={18} /> Back to Menu
          </button>
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 md:p-8">
            <h2 className="text-xl sm:text-2xl font-bold mb-2 flex items-center gap-2"><ListChecks className="text-blue-500" size={24}/> Vocabulary Match</h2>
            <p className="text-sm sm:text-base text-slate-600 mb-6 sm:mb-8">Select a term and its matching definition.</p>
            <div className="grid grid-cols-2 gap-x-4 sm:gap-x-8 gap-y-3">
              <div className="space-y-3">
                {terms.map(item => (
                  <div key={item.id} onClick={() => handleSelect(item)}
                    className={`p-3 rounded-lg border-2 transition-all text-sm sm:text-base font-semibold text-center ${getStyle(item)}`}>
                    {matched[item.id] ? <CheckCircle2 className="inline mr-1 text-green-500" size={16}/> : null}{item.content}
                  </div>
                ))}
              </div>
              <div className="space-y-3">
                {defs.map(item => (
                  <div key={item.id} onClick={() => handleSelect(item)}
                    className={`p-3 rounded-lg border-2 transition-all text-xs sm:text-sm ${getStyle(item)}`}>
                    {item.content}
                  </div>
                ))}
              </div>
            </div>
            {isComplete && (
              <div className="mt-6 pt-6 border-t flex flex-col sm:flex-row items-center justify-between gap-4 animate-in fade-in">
                <p className="text-green-600 font-bold text-lg flex items-center gap-2"><CheckCircle2 size={22}/> Perfect! All matched!</p>
                <div className="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                  <button onClick={() => { if (!studentName) { setErrorMsg("Preencha seu nome!"); return; } fallbackCopyTextToClipboard(generateReport()); setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); setErrorMsg(""); }}
                    className="flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium">
                    <Copy size={16}/> {isCopied ? 'Copiado!' : 'Copiar'}
                  </button>
                  <button onClick={() => { if (!studentName) { setErrorMsg("Preencha seu nome!"); return; } window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(generateReport())}`, '_blank'); setErrorMsg(""); }}
                    className="flex items-center justify-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium">
                    <MessageCircle size={16}/> WhatsApp
                  </button>
                </div>
                {errorMsg && <span className="text-red-500 text-xs font-medium">{errorMsg}</span>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 2. QUIZ GAME ---
    function QuizGame({ goBack, studentName, saveProgress }) {
      const [QUIZ_DATA] = useState(() => pickRandom(ALL_QUIZ_VERSIONS));
      const [versionLabel] = useState(() => { const i = ALL_QUIZ_VERSIONS.indexOf(QUIZ_DATA) + 1; return `Round ${i}`; });
      const [currentQ, setCurrentQ] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [finished, setFinished] = useState(false);
      const [isCopied, setIsCopied] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const question = QUIZ_DATA[currentQ];

      const generateReport = () =>
        `🎓 *Relatório: English Practice*\n👤 *Aluno:* ${studentName}\n📝 *Atividade:* Reading Quiz (${versionLabel})\n✅ *Nota:* ${score}/${QUIZ_DATA.length} (${Math.round(score/QUIZ_DATA.length*100)}%)`;

      const handleAnswer = (idx) => {
        if (isAnswered) return;
        setSelectedAnswer(idx); setIsAnswered(true);
        if (idx === question.correct) { setScore(s => s + 1); sfx.correct(); }
        else sfx.wrong();
      };

      const nextQuestion = () => {
        if (currentQ < QUIZ_DATA.length - 1) { setCurrentQ(q => q+1); setSelectedAnswer(null); setIsAnswered(false); }
        else {
          setFinished(true); sfx.complete();
          const finalScore = score + (QUIZ_DATA[currentQ] && selectedAnswer === QUIZ_DATA[currentQ].correct ? 1 : 0);
          saveProgress('quiz', finalScore === QUIZ_DATA.length ? 'perfect' : 'partial');
        }
      };

      return (
        <div className="animate-in duration-300">
          <button onClick={goBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 mb-4 sm:mb-6 transition-colors font-medium">
            <ArrowLeft size={18}/> Back to Menu
          </button>
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 md:p-8 max-w-2xl mx-auto">
            {finished ? (
              <div className="text-center py-8">
                <Award className="mx-auto text-amber-400 mb-4" size={56}/>
                <h2 className="text-2xl sm:text-3xl font-bold mb-2">Quiz Complete!</h2>
                <p className="text-slate-600 mb-4">You scored <span className="font-bold text-blue-600 text-xl">{score} / {QUIZ_DATA.length}</span></p>
                <div className="flex flex-col sm:flex-row gap-3 justify-center mt-6">
                  <button onClick={() => { setCurrentQ(0); setScore(0); setFinished(false); setSelectedAnswer(null); setIsAnswered(false); }}
                    className="flex items-center justify-center gap-2 px-4 py-3 sm:py-2 bg-amber-500 text-white rounded-lg font-medium">
                    <RefreshCw size={18}/> Retry
                  </button>
                  <button onClick={goBack} className="flex items-center justify-center px-4 py-3 sm:py-2 border border-slate-300 rounded-lg font-medium">Finish</button>
                  <button onClick={() => { if (!studentName) { setErrorMsg("Preencha seu nome!"); return; } fallbackCopyTextToClipboard(generateReport()); setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); setErrorMsg(""); }}
                    className="flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium">
                    <Copy size={16}/> {isCopied ? 'Copiado!' : 'Copiar'}
                  </button>
                  <button onClick={() => { if (!studentName) { setErrorMsg("Preencha seu nome!"); return; } window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(generateReport())}`, '_blank'); setErrorMsg(""); }}
                    className="flex items-center justify-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium">
                    <MessageCircle size={16}/> WhatsApp
                  </button>
                </div>
                {errorMsg && <p className="text-red-500 text-sm mt-2">{errorMsg}</p>}
              </div>
            ) : (
              <>
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-6 sm:mb-8">
                  <h2 className="text-lg sm:text-xl font-bold flex items-center gap-2"><ListChecks className="text-amber-500" size={24}/> Reading Quiz <span className="text-xs font-normal text-amber-500 bg-amber-50 px-2 py-0.5 rounded-full">{versionLabel}</span></h2>
                  <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs sm:text-sm font-semibold self-start sm:self-auto">
                    Question {currentQ + 1} of {QUIZ_DATA.length}
                  </span>
                </div>
                <h3 className="text-lg sm:text-xl text-slate-800 font-medium mb-4 sm:mb-6 leading-snug">{question.question}</h3>
                <div className="space-y-2 sm:space-y-3 mb-6 sm:mb-8">
                  {question.options.map((opt, idx) => {
                    let btnStyle = "bg-white border-slate-200 active:bg-slate-50";
                    let icon = null;
                    if (isAnswered) {
                      if (idx === question.correct) { btnStyle = "bg-green-50 border-green-500 text-green-900"; icon = <CheckCircle2 className="text-green-500 shrink-0" size={20}/>; }
                      else if (idx === selectedAnswer) { btnStyle = "bg-red-50 border-red-500 text-red-900"; icon = <XCircle className="text-red-500 shrink-0" size={20}/>; }
                      else { btnStyle = "bg-slate-50 border-slate-200 opacity-50"; }
                    }
                    return (
                      <button key={idx} onClick={() => handleAnswer(idx)} disabled={isAnswered}
                        className={`w-full text-left p-3 sm:p-4 rounded-lg border transition-all flex items-center justify-between gap-3 text-sm sm:text-base ${btnStyle}`}>
                        <span>{opt}</span>{icon}
                      </button>
                    );
                  })}
                </div>
                {isAnswered && (
                  <div className="flex justify-end animate-in fade-in">
                    <button onClick={nextQuestion} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 text-white px-6 py-3 sm:py-2 rounded-lg font-medium">
                      {currentQ < QUIZ_DATA.length - 1 ? 'Next Question' : 'See Results'} <ChevronRight size={18}/>
                    </button>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // --- 3. FILL IN THE BLANKS ---
    function BlanksGame({ goBack, studentName, saveProgress }) {
      const [BLANKS_DATA] = useState(() => pickRandom(ALL_BLANKS_VERSIONS));
      const [versionLabel] = useState(() => { const i = ALL_BLANKS_VERSIONS.indexOf(BLANKS_DATA) + 1; return `Round ${i}`; });
      const [answers, setAnswers] = useState({});
      const [checked, setChecked] = useState(false);
      const [score, setScore] = useState(0);
      const [isCopied, setIsCopied] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const totalBlanks = BLANKS_DATA.filter(item => item.isBlank).length;

      const generateReport = () => {
        let text = `🎓 *Relatório: English Practice*\n👤 *Aluno:* ${studentName}\n📝 *Atividade:* Fill in the Blanks (${versionLabel})\n✅ *Nota:* ${score}/${totalBlanks}\n\n*Respostas do Aluno:*`;
        let blankCount = 1;
        BLANKS_DATA.forEach((item, index) => {
          if (item.isBlank) {
            const userAns = answers[index] || "Não respondido";
            const isRight = userAns === item.text;
            text += `\n${blankCount}️⃣ Lacuna ${blankCount}: ${userAns} ${isRight ? '✅' : '❌ (Correto: '+item.text+')'}`;
            blankCount++;
          }
        });
        return text;
      };

      const handleSelect = (index, value) => { setAnswers(prev => ({ ...prev, [index]: value })); setChecked(false); setIsCopied(false); setErrorMsg(""); };
      const checkAnswers = () => {
        let s = 0;
        BLANKS_DATA.forEach((item, index) => { if (item.isBlank && answers[index] === item.text) s++; });
        setScore(s); setChecked(true);
        if (s === totalBlanks) { sfx.complete(); saveProgress('blanks', 'perfect'); }

    // --- 4. SHADOWING GAME COM ÁUDIO REAL ---
    function ShadowingGame({ goBack, saveProgress }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [step, setStep] = useState(1); // 1: ouvir, 2: ver texto, 3: avançar
      const [audioState, setAudioState] = useState('idle'); // idle | loading | playing | error
      const audioRef = useRef(null);

      const clip = AUDIO_CLIPS[currentIndex];

      // Reset ao trocar de fala
      useEffect(() => {
        setStep(1);
        setAudioState('idle');
        if (audioRef.current) {
          audioRef.current.onerror = null;
          audioRef.current.pause();
          audioRef.current.src = '';
        }
      }, [currentIndex]);

      const playAudio = (onEnded) => {
        setAudioState('loading');
        const audio = new Audio(clip.src);
        audioRef.current = audio;

        audio.oncanplaythrough = () => {
          setAudioState('playing');
          audio.play().catch(() => setAudioState('error'));
        };
        audio.onended = () => {
          setAudioState('idle');
          if (onEnded) onEnded();
        };
        audio.onerror = () => setAudioState('error');
        audio.load();
      };

      const handleListen = () => {
        if (audioState === 'playing' || audioState === 'loading') return;
        if (audioRef.current) { audioRef.current.onerror = null; audioRef.current.pause(); audioRef.current.src = ''; }
        playAudio(() => { if (step === 1) setStep(2); });
      };

      const handleSeeText = () => {
        if (audioState === 'playing' || audioState === 'loading') return;
        setStep(3);
        if (audioRef.current) { audioRef.current.onerror = null; audioRef.current.pause(); audioRef.current.src = ''; }
        playAudio(null);
      };

      const nextLine = () => {
        if (currentIndex < AUDIO_CLIPS.length - 1) setCurrentIndex(i => i + 1);
      };

      const speakerColor = (speaker) => {
        if (speaker.includes('Sasha')) return 'text-teal-600';
        if (speaker.includes('Jared')) return 'text-blue-600';
        return 'text-amber-600';
      };

      const isLoading = audioState === 'loading';
      const isPlaying = audioState === 'playing';
      const busy = isLoading || isPlaying;

      return (
        <div className="animate-in duration-300">
          <button onClick={goBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 mb-4 sm:mb-6 transition-colors font-medium">
            <ArrowLeft size={18}/> Back to Menu
          </button>

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 md:p-8 max-w-2xl mx-auto flex flex-col items-center text-center">
            <h2 className="text-xl sm:text-2xl font-bold mb-4 flex items-center gap-2">
              <Volume2 className="text-red-500" size={24}/> Shadowing Practice
            </h2>
            <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs sm:text-sm font-semibold mb-8">
              Fala {currentIndex + 1} de {AUDIO_CLIPS.length}
            </span>

            {/* Caixa de texto */}
            <div className="min-h-[130px] flex flex-col items-center justify-center w-full bg-slate-50 rounded-lg p-6 mb-8 border border-slate-100">
              {step >= 3 ? (
                <>
                  <span className={`font-bold text-sm uppercase tracking-wider mb-2 ${speakerColor(clip.speaker)}`}>{clip.speaker}</span>
                  <p className="text-lg sm:text-xl font-medium text-slate-800">{clip.label}</p>
                </>
              ) : (
                <p className="text-slate-400 italic text-sm">Texto oculto. Ouça o áudio primeiro.</p>
              )}
            </div>

            {/* Feedback de estado */}
            {audioState === 'error' && (
              <p className="text-red-500 text-sm mb-4 bg-red-50 border border-red-200 rounded-lg px-4 py-2">
                ⚠️ Não foi possível carregar o áudio. Verifique se o arquivo está público no Google Drive.
              </p>
            )}

            {/* Botões */}
            <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
              <button onClick={handleListen} disabled={busy}
                className="px-6 py-3 bg-red-100 text-red-700 font-semibold rounded-lg hover:bg-red-200 transition disabled:opacity-50 flex items-center justify-center gap-2">
                {isLoading ? <><Loader size={20} className="animate-spin"/> Carregando...</> : isPlaying ? <><Volume2 size={20}/> Reproduzindo...</> : <><Volume2 size={20}/> {step >= 2 ? 'Ouvir Novamente' : 'Ouvir Fala'}</>}
              </button>

              {step >= 2 && step < 3 && (
                <button onClick={handleSeeText} disabled={busy}
                  className="px-6 py-3 bg-slate-800 text-white font-semibold rounded-lg hover:bg-slate-900 transition flex items-center justify-center gap-2 animate-in slide-in-from-bottom-2">
                  <BookOpen size={20}/> Ver Texto
                </button>
              )}

              {step >= 3 && currentIndex < AUDIO_CLIPS.length - 1 && (
                <button onClick={nextLine} disabled={busy}
                  className="px-6 py-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition flex items-center justify-center gap-2 animate-in slide-in-from-bottom-2">
                  Próxima <ChevronRight size={20}/>
                </button>
              )}

              {step >= 3 && currentIndex === AUDIO_CLIPS.length - 1 && (
                <button onClick={() => { saveProgress('shadowing', 'done'); goBack(); }} disabled={busy}
                  className="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition flex items-center justify-center gap-2 animate-in slide-in-from-bottom-2">
                  Concluir ✅
                </button>
              )}
            </div>

            {/* Barra de progresso */}
            <div className="w-full bg-slate-100 rounded-full h-2 mt-8">
              <div className="bg-red-500 h-2 rounded-full transition-all duration-500"
                style={{ width: `${((currentIndex + (step >= 3 ? 1 : 0)) / AUDIO_CLIPS.length) * 100}%` }} />
            </div>
          </div>
        </div>
      );
    }

      }, [currentIndex]);

      // --- Tocar áudio original ---
      const playOriginal = () => {
        if (audioState === 'playing' || audioState === 'loading') return;
        if (audioRef.current) { audioRef.current.onerror = null; audioRef.current.pause(); audioRef.current.src = ''; }
        setAudioState('loading');
        const audio = new Audio(clip.src);
        audioRef.current = audio;
        audio.oncanplaythrough = () => { setAudioState('playing'); audio.play().catch(() => setAudioState('error')); };
        audio.onended = () => { setAudioState('idle'); if (step === 'listen') setStep('record'); };
        audio.onerror = () => setAudioState('error');
        audio.load();
      };

      // --- Tocar gravação do aluno ---
      const playRecording = () => {
        if (!recordedUrl) return;
        if (audioRef.current) { audioRef.current.onerror = null; audioRef.current.pause(); audioRef.current.src = ''; }
        setAudioState('playing');
        const audio = new Audio(recordedUrl);
        audioRef.current = audio;
        audio.onended = () => setAudioState('idle');
        audio.play().catch(() => setAudioState('error'));
      };

      // --- Gravar ---
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunksRef.current = [];
          const mr = new MediaRecorder(stream);
          mediaRecRef.current = mr;
          mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          mr.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            setRecordedUrl(url);
            setRecState('recorded');
            setStep('playback');
            stream.getTracks().forEach(t => t.stop());
          };
          mr.start();
          setRecState('recording');
        } catch(e) {
          alert('Não foi possível acessar o microfone. Verifique as permissões do navegador.');
        }
      };

      const stopRecording = () => {
        if (mediaRecRef.current && recState === 'recording') {
          mediaRecRef.current.stop();
        }
      };

      const nextLine = () => {
        if (currentIndex < AUDIO_CLIPS.length - 1) setCurrentIndex(i => i + 1);
        else { setStep('done'); saveProgress('speaking', 'done'); }
      };

      const speakerColor = (speaker) => {
        if (speaker.includes('Sasha')) return 'text-teal-600';
        if (speaker.includes('Jared')) return 'text-blue-600';
        return 'text-amber-600';
      };

      const busy = audioState === 'playing' || audioState === 'loading';
      const progress = ((currentIndex + (step === 'done' ? 1 : 0)) / AUDIO_CLIPS.length) * 100;

      if (step === 'done') {
        return (
          <div className="animate-in duration-300">
            <button onClick={goBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 mb-4 sm:mb-6 transition-colors font-medium">
              <ArrowLeft size={18}/> Back to Menu
            </button>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8 max-w-2xl mx-auto text-center">
              <div className="text-6xl mb-4">🎙️</div>
              <h2 className="text-2xl font-bold text-slate-800 mb-2">Great speaking practice!</h2>
              <p className="text-slate-500 mb-6">You recorded all {AUDIO_CLIPS.length} lines. Keep practicing to improve your pronunciation!</p>
              <div className="flex flex-col sm:flex-row gap-3 justify-center">
                <button onClick={() => { setCurrentIndex(0); setStep('listen'); }}
                  className="flex items-center justify-center gap-2 px-6 py-2 bg-pink-600 text-white rounded-lg font-medium hover:bg-pink-700 transition">
                  <RefreshCw size={18}/> Practice Again
                </button>
                <button onClick={goBack} className="flex items-center justify-center px-6 py-2 border border-slate-300 rounded-lg font-medium">Back to Menu</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="animate-in duration-300">
          <button onClick={goBack} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 mb-4 sm:mb-6 transition-colors font-medium">
            <ArrowLeft size={18}/> Back to Menu
          </button>

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 md:p-8 max-w-2xl mx-auto flex flex-col items-center text-center">
            <h2 className="text-xl sm:text-2xl font-bold mb-1 flex items-center gap-2">
              <MessageCircle className="text-pink-500" size={24}/> Speaking Practice
            </h2>
            <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs sm:text-sm font-semibold mb-6">
              Fala {currentIndex + 1} de {AUDIO_CLIPS.length}
            </span>

            {/* Etapas visuais */}
            <div className="flex items-center gap-2 mb-6 text-xs font-semibold">
              {['listen','record','playback'].map((s, i) => {
                const labels = ['1. Ouça', '2. Grave', '3. Compare'];
                const active = step === s;
                const done = ['listen','record','playback'].indexOf(step) > i;
                return (
                  <React.Fragment key={s}>
                    <span className={`px-3 py-1 rounded-full transition-all ${active ? 'bg-pink-600 text-white' : done ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}`}>
                      {done ? '✓ ' : ''}{labels[i]}
                    </span>
                    {i < 2 && <ChevronRight size={14} className="text-slate-300"/>}
                  </React.Fragment>
                );
              })}
            </div>

            {/* Caixa de texto */}
            <div className="min-h-[110px] flex flex-col items-center justify-center w-full bg-slate-50 rounded-lg p-5 mb-6 border border-slate-100">
              {showText ? (
                <>
                  <span className={`font-bold text-xs uppercase tracking-wider mb-2 ${speakerColor(clip.speaker)}`}>{clip.speaker}</span>
                  <p className="text-base sm:text-lg font-medium text-slate-800">{clip.label}</p>
                </>
              ) : (
                <button onClick={() => setShowText(true)} className="text-sm text-slate-400 underline underline-offset-2 hover:text-slate-600 transition">
                  👁 Ver texto da fala
                </button>
              )}
            </div>

            {/* Controles por etapa */}
            <div className="flex flex-col gap-3 w-full max-w-sm">

              {/* ETAPA 1: Ouvir */}
              <div className={`rounded-lg border p-4 transition-all ${step === 'listen' ? 'border-pink-300 bg-pink-50' : 'border-slate-100 bg-slate-50 opacity-60'}`}>
                <p className="text-xs font-bold text-pink-600 uppercase tracking-wider mb-2">Passo 1 — Ouça o modelo</p>
                <button onClick={playOriginal} disabled={busy}
                  className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-pink-600 text-white font-semibold rounded-lg hover:bg-pink-700 transition disabled:opacity-50">
                  {audioState === 'loading' ? <><Loader size={18} className="animate-spin"/> Carregando...</>
                   : audioState === 'playing' ? <><Volume2 size={18}/> Reproduzindo...</>
                   : <><Volume2 size={18}/> {step !== 'listen' ? 'Ouvir novamente' : 'Ouvir fala'}</>}
                </button>
              </div>

              {/* ETAPA 2: Gravar */}
              <div className={`rounded-lg border p-4 transition-all ${step === 'record' ? 'border-red-300 bg-red-50' : 'border-slate-100 bg-slate-50 opacity-60'}`}>
                <p className="text-xs font-bold text-red-600 uppercase tracking-wider mb-2">Passo 2 — Grave sua voz</p>
                {recState !== 'recording' ? (
                  <button onClick={startRecording} disabled={step !== 'record' && step !== 'playback'}
                    className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition disabled:opacity-40">
                    🔴 {recState === 'recorded' ? 'Gravar novamente' : 'Iniciar gravação'}
                  </button>
                ) : (
                  <button onClick={stopRecording}
                    className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-700 text-white font-semibold rounded-lg animate-pulse">
                    ⏹ Parar gravação
                  </button>
                )}
              </div>

              {/* ETAPA 3: Comparar */}
              <div className={`rounded-lg border p-4 transition-all ${step === 'playback' ? 'border-green-300 bg-green-50' : 'border-slate-100 bg-slate-50 opacity-60'}`}>
                <p className="text-xs font-bold text-green-600 uppercase tracking-wider mb-2">Passo 3 — Compare com o original</p>
                <div className="flex gap-2">
                  <button onClick={playOriginal} disabled={busy || step !== 'playback'}
                    className="flex-1 flex items-center justify-center gap-1 px-3 py-2 bg-slate-700 text-white text-sm font-semibold rounded-lg hover:bg-slate-800 transition disabled:opacity-40">
                    <Volume2 size={16}/> Original
                  </button>
                  <button onClick={playRecording} disabled={busy || !recordedUrl}
                    className="flex-1 flex items-center justify-center gap-1 px-3 py-2 bg-green-600 text-white text-sm font-semibold rounded-lg hover:bg-green-700 transition disabled:opacity-40">
                    <Volume2 size={16}/> Minha voz
                  </button>
                </div>
              </div>

              {/* Avançar */}
              {step === 'playback' && (
                <button onClick={nextLine}
                  className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-pink-600 text-white font-semibold rounded-lg hover:bg-pink-700 transition animate-in slide-in-from-bottom-2 mt-1">
                  {currentIndex < AUDIO_CLIPS.length - 1 ? <> Próxima fala <ChevronRight size={20}/></> : '✅ Concluir'}
                </button>
              )}
            </div>

            {/* Barra de progresso */}
            <div className="w-full bg-slate-100 rounded-full h-2 mt-8">
              <div className="bg-pink-500 h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}/>
            </div>
          </div>
        </div>
      );
    }

    // --- RENDER ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
